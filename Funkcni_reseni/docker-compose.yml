services:
  # ================= CONFIG SERVERS =================
  configsvr1:
    image: mongo:8.0
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--port", "27017", "--bind_ip_all", "--dbpath", "/data/configdb"]
    volumes:
      - ../data/configsvr1:/data/configdb
    networks: [mongo-net]

  configsvr2:
    image: mongo:8.0
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--port", "27017", "--bind_ip_all", "--dbpath", "/data/configdb"]
    volumes:
      - ../data/configsvr2:/data/configdb
    networks: [mongo-net]

  configsvr3:
    image: mongo:8.0
    command: ["mongod", "--configsvr", "--replSet", "cfgRS", "--port", "27017", "--bind_ip_all", "--dbpath", "/data/configdb"]
    volumes:
      - ../data/configsvr3:/data/configdb
    networks: [mongo-net]

  # ================= SHARD 1 =================
  shard1_primary:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard1_primary:/data/db
    networks: [mongo-net]

  shard1_secondary1:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard1_secondary1:/data/db
    networks: [mongo-net]

  shard1_secondary2:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard1RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard1_secondary2:/data/db
    networks: [mongo-net]

  # ================= SHARD 2 =================
  shard2_primary:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard2_primary:/data/db
    networks: [mongo-net]

  shard2_secondary1:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard2_secondary1:/data/db
    networks: [mongo-net]

  shard2_secondary2:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard2RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard2_secondary2:/data/db
    networks: [mongo-net]

  # ================= SHARD 3 =================
  shard3_primary:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard3RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard3_primary:/data/db
    networks: [mongo-net]

  shard3_secondary1:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard3RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard3_secondary1:/data/db
    networks: [mongo-net]

  shard3_secondary2:
    image: mongo:8.0
    command: ["mongod", "--shardsvr", "--replSet", "shard3RS", "--port", "27017", "--bind_ip_all"]
    volumes:
      - ../data/shard3_secondary2:/data/db
    networks: [mongo-net]

  # ================= INIT =================
  mongo-init:
    image: mongo:8.0
    entrypoint: ["/bin/bash", "/mongo-init/mongo-init.sh"]
    volumes:
      - ./mongo-init:/mongo-init:ro
    networks: [mongo-net]
    restart: "no"

  # ================= MONGOS ROUTERS =================
  mongos1:
    image: mongo:8.0
    command:
      [
        "mongos",
        "--configdb", "cfgRS/configsvr1:27017,configsvr2:27017,configsvr3:27017",
        "--bind_ip_all",
        "--port", "27017"
      ]
    ports:
      - "27017:27017"
    networks: [mongo-net]

  mongos2:
    image: mongo:8.0
    command:
      [
        "mongos",
        "--configdb", "cfgRS/configsvr1:27017,configsvr2:27017,configsvr3:27017",
        "--bind_ip_all",
        "--port", "27017"
      ]
    ports:
      - "27018:27017"
    networks: [mongo-net]

  # ================= IMPORT =================
  mongo-import:
    image: python:3.12-slim
    depends_on:
      mongo-init:
        condition: service_completed_successfully
    environment:
      - MONGO_URI=mongodb://admin:adminpass@mongos1:27017,mongos2:27017/admin?authSource=admin
      - DB_NAME=steam_bd
      - DATA_DIR=/data
    volumes:
      - ../DataSets:/data:ro
      - ./mongo-init:/app:ro
    working_dir: /app
    command: >
      sh -lc "pip install --no-cache-dir pymongo &&
              python import_data.py"
    restart: "no"
    networks: [mongo-net]

  # ================= SHARD COLLECTIONS =================
  mongo-shard-collections:
    image: mongo:8.0
    depends_on:
      mongo-import:
        condition: service_completed_successfully
    volumes:
      - ./mongo-init:/mongo-init:ro
    networks: [mongo-net]
    restart: "no"
    command:
      [
        "bash",
        "-lc",
        "mongosh 'mongodb://admin:adminpass@mongos1:27017,mongos2:27017/admin?authSource=admin' --quiet /mongo-init/02b-shard-collections.js"
      ]

  # ================= UI =================
  mongo-express:
    image: mongo-express:1.0.2
    depends_on:
      mongo-import:
        condition: service_completed_successfully
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://admin:adminpass@mongos1:27017,mongos2:27017/admin?authSource=admin
      - ME_CONFIG_BASICAUTH=false
    ports:
      - "8082:8081"
    networks: [mongo-net]

  mongo-compass:
    image: haohanyang/compass-web
    ports:
      - "8083:8080"
    environment:
      - MONGO_URL=mongodb://admin:adminpass@mongos1:27017,mongos2:27017/admin?authSource=admin
    networks: [mongo-net]

  mongo-client:
    image: mongo:8.0
    command: ["sleep", "infinity"]
    depends_on:
      mongos1:
        condition: service_started
      mongos2:
        condition: service_started
    networks: [mongo-net]

networks:
  mongo-net:
    name: funkcni_reseni_mongo-net